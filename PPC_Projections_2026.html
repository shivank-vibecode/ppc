<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPC 2026 Projections</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>

* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0d1117; color:#e6edf3; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:14px; }

/* Header */
.header { display:flex; align-items:center; gap:16px; padding:18px 24px 14px; border-bottom:1px solid #21262d; }
.hicon  { font-size:30px; }
.header h1 { font-size:20px; font-weight:700; }
.header p  { font-size:12px; color:#8b949e; margin-top:3px; }

/* KPI bar */
.kpi-bar { display:flex; gap:1px; background:#21262d; }
.kpi { flex:1; padding:12px 14px; background:#161b22; text-align:center; }
.kpi-lbl { font-size:10px; color:#8b949e; text-transform:uppercase; letter-spacing:.5px; }
.kpi-val { font-size:20px; font-weight:700; margin:3px 0 2px; }
.kpi-sub { font-size:11px; color:#8b949e; }
.k-all    .kpi-val { color:#e6edf3; }
.k-core   .kpi-val { color:#3fb950; }
.k-exp    .kpi-val { color:#ffa657; }
.k-share  .kpi-val { color:#58a6ff; }

/* Controls bar */
.ctrl-bar { display:flex; align-items:center; gap:12px; padding:12px 24px; background:#0d1117; border-bottom:1px solid #21262d; flex-wrap:wrap; }
.view-toggle { display:inline-flex; background:#161b22; border:1px solid #30363d; border-radius:8px; overflow:hidden; }
.vt-btn { padding:7px 20px; border:none; background:transparent; color:#8b949e; cursor:pointer; font-size:13px; font-weight:600; transition:all .15s; }
.vt-btn.active { background:#238636; color:#fff; }
.legend { display:flex; gap:14px; align-items:center; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:12px; color:#8b949e; }
.legend-dot { width:10px; height:10px; border-radius:50%; }

/* Section */
.section { padding:20px 24px 28px; }
.section-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.section-title  { font-size:15px; font-weight:700; }
.section-badge  { font-size:11px; font-weight:600; padding:2px 10px; border-radius:20px; background:#21262d; color:#8b949e; border:1px solid #30363d; }
.tbl-wrap { border:1px solid #21262d; border-radius:10px; overflow:auto; }
.charts-grid { display:flex; flex-direction:column; gap:20px; }
.chart-card { background:#0d1117; border:1px solid #21262d; border-radius:10px; padding:16px 18px 12px; }
.chart-title { font-size:12px; font-weight:700; color:#c9d1d9; text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }

/* Shared table base */
table { border-collapse:collapse; width:100%; font-size:12px; }
thead th { position:sticky; top:0; z-index:2; background:#0d1117; padding:7px 11px; font-size:10px; font-weight:700; color:#8b949e; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid #21262d; text-align:right; white-space:nowrap; }
thead th.lc { text-align:left; min-width:120px; }
thead tr.seg-row th { padding:5px 11px 4px; font-size:10px; background:#0a0f17; border-bottom:1px solid #1c2128; letter-spacing:.6px; }
thead tr.seg-row th.core-hdr { color:#3fb950; }
thead tr.seg-row th.exp-hdr  { color:#ffa657; }
thead tr.seg-row th.tot-hdr  { color:#8b949e; }
tbody td { padding:8px 11px; border-bottom:1px solid #161b22; text-align:right; white-space:nowrap; vertical-align:middle; }
tbody td.lc { text-align:left; font-weight:600; color:#e6edf3; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:#1c2128; }
tfoot td { background:#0d1117; padding:8px 11px; text-align:right; font-weight:700; border-top:2px solid #30363d; white-space:nowrap; }
tfoot td.lc { text-align:left; color:#8b949e; font-size:10px; text-transform:uppercase; letter-spacing:.4px; }

/* Segment dividers */
.c-sep { border-left:2px solid #30363d !important; }

/* Funded emphasis */
.f-core  { color:#3fb950; font-weight:700; }
.f-exp   { color:#ffa657; font-weight:700; }
.f-total { color:#e6edf3; font-weight:700; }

/* Trend arrows */
.au { color:#3fb950; font-size:10px; }
.ad { color:#f85149; font-size:10px; }

/* Conversion chips */
.chip { display:inline-flex; align-items:center; justify-content:center; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; min-width:48px; }
.cd2r     { background:rgba(56,139,253,.12); color:#58a6ff; border:1px solid rgba(56,139,253,.2); }
.cr2f     { background:rgba(188,140,255,.12); color:#bc8cff; border:1px solid rgba(188,140,255,.2); }
.cd2r.hi  { background:rgba(56,139,253,.28); color:#79c0ff; border-color:rgba(56,139,253,.45); }
.cr2f.hi  { background:rgba(188,140,255,.28); color:#d2a8ff; border-color:rgba(188,140,255,.45); }
.cd2r.lo  { background:rgba(56,139,253,.04); color:#388bfd; border-color:rgba(56,139,253,.1); }
.cr2f.lo  { background:rgba(188,140,255,.04); color:#8957e5; border-color:rgba(188,140,255,.1); }

/* Geo: rank badges + expand */
.rank { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; font-size:10px; font-weight:700; margin-right:6px; flex-shrink:0; vertical-align:middle; }
.r1 { background:#ffa657; color:#0d1117; }
.r2 { background:#c9d1d9; color:#0d1117; }
.r3 { background:#e8b467; color:#0d1117; }
.rn { background:#21262d; color:#8b949e; }
.expand-btn { background:none; border:none; color:#58a6ff; cursor:pointer; font-size:11px; padding:0 5px 0 0; line-height:1; vertical-align:middle; }
.expand-btn:hover { color:#79c0ff; }

/* Geo: share bar */
.sbar-wrap { display:flex; align-items:center; gap:5px; justify-content:flex-end; }
.sbar-bg   { width:50px; height:5px; background:#21262d; border-radius:3px; overflow:hidden; }
.sbar-fill { height:100%; border-radius:3px; background:#238636; }
.sbar-txt  { font-size:10px; color:#8b949e; min-width:28px; text-align:right; }

/* Geo: sticky first col */
tbody td.gc { text-align:left; font-weight:600; position:sticky; left:0; background:#161b22; z-index:1; border-right:1px solid #21262d; }
tbody tr:hover td.gc { background:#1c2128; }
tfoot td.gc { position:sticky; left:0; background:#0d1117; z-index:1; border-right:1px solid #21262d; text-align:left; }
thead th.gc { position:sticky; left:0; z-index:3; background:#0d1117; text-align:left; min-width:150px; }

/* Geo: detail expand row */
tbody tr.det-row td { padding:0; background:#0a0f17; border-bottom:1px solid #21262d; }
tbody tr.det-row td.gc { background:#0a0f17; }
.det-inner { padding:8px 6px 8px 28px; overflow-x:auto; }
table.dt { font-size:11px; }
table.dt thead th { background:#0a0f17; font-size:9px; padding:5px 10px; top:auto; position:relative; z-index:0; }
table.dt thead th.lc { position:relative; }
table.dt thead tr.seg-row th { background:#070c13; }
table.dt tbody td { padding:5px 10px; background:transparent; }
table.dt tbody tr:hover td { background:#111620; }
table.dt tbody td.lc { position:relative; background:transparent; }
table.dt tfoot td { padding:5px 10px; }
table.dt tfoot td.lc { position:relative; }

.proj-layout { display:flex; min-height:100vh; }
.proj-sidebar { width:230px; min-width:230px; background:#0c1520; border-right:1px solid #21262d; position:sticky; top:0; height:100vh; overflow-y:auto; flex-shrink:0; }
.proj-sidebar-title { font-size:10px; font-weight:700; color:#8b949e; text-transform:uppercase; letter-spacing:.8px; padding:14px 16px 8px; border-bottom:1px solid #21262d; margin-bottom:4px; }
.proj-main { flex:1; min-width:0; overflow:hidden; }
.proj-nav-item { display:flex; align-items:center; gap:8px; padding:9px 14px; cursor:pointer; font-size:13px; color:#c9d1d9; border-left:3px solid transparent; transition:background .12s; }
.proj-nav-item:hover { background:#161b22; color:#e6edf3; }
.proj-nav-item.active { background:#161b22; border-left-color:#58a6ff; color:#e6edf3; font-weight:600; }
.proj-rank { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; font-size:10px; font-weight:700; background:#21262d; color:#8b949e; flex-shrink:0; }
.proj-rank.r1 { background:#d29922; color:#0d1117; }
.proj-rank.r2 { background:#8b949e; color:#0d1117; }
.proj-rank.r3 { background:#c47226; color:#0d1117; }
.proj-nav-name { flex:1; }
.proj-nav-fy { font-size:11px; color:#8b949e; font-variant-numeric:tabular-nums; }
.proj-nav-item.active .proj-nav-fy { color:#58a6ff; }
/* status badges */
.sb { display:inline-flex; align-items:center; gap:3px; border-radius:4px; padding:2px 7px; font-size:10px; font-weight:700; white-space:nowrap; }
.sb-complete  { background:rgba(63,185,80,.15);  color:#3fb950; }
.sb-partial   { background:rgba(255,166,87,.15);  color:#ffa657; }
.sb-projected { background:rgba(88,166,255,.15);  color:#58a6ff; }
/* projected value styles */
.pv  { color:#58a6ff; font-style:italic; }
.pa  { color:#58a6ff; font-size:11px; }
/* row tinting */
tr.tr-partial   td { background:rgba(255,166,87,.04); }
tr.tr-projected td { background:rgba(88,166,255,.04); }
/* wma pill */
.wma-pill { background:#161b22; border:1px solid #30363d; border-radius:6px; padding:4px 12px; font-size:11px; color:#8b949e; }
.wma-pill span { color:#c9d1d9; font-weight:600; }

</style>
</head>
<body>

<div class="proj-layout">
  <aside class="proj-sidebar">
    <div class="proj-sidebar-title">Regions &mdash; by 2026 Proj</div>
    <div id="proj-nav"></div>
  </aside>
  <main class="proj-main">
    <div class="header">
      <div class="hicon">&#128202;</div>
      <div>
        <h1 id="proj-geo-name">—</h1>
        <p>2026 Projections &nbsp;&middot;&nbsp; Weekly moving average &nbsp;&middot;&nbsp; Core &amp; Experiment</p>

    </div>
    <div class="kpi-bar" id="proj-kpi-bar"></div>
    <div class="ctrl-bar">
      <div class="view-toggle">
        <button class="vt-btn active" id="vt-monthly" data-view="monthly">Monthly</button>
        <button class="vt-btn"        id="vt-weekly"  data-view="weekly">Weekly</button>

      <div id="wma-info" class="wma-pill">WMA basis: <span>—</span></div>

        <div class="legend-item"><div class="legend-dot" style="background:rgba(63,185,80,0.3);"></div>Core Proj</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(255,166,87,0.3);"></div>Exp Proj</div>
      </div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-title">Funded &amp; Spend Projection</span>
        <span class="section-badge" id="proj-period-badge">—</span>
      </div>
      <div class="tbl-wrap"><div id="proj-tbl"></div></div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-title">Monthly Charts &mdash; Actual vs Projected</span>
      </div>
      <div class="charts-grid">
        <div class="chart-card"><div class="chart-title">Funded</div><canvas id="proj-chart-funded"></canvas></div>
        <div class="chart-card"><div class="chart-title">Spend</div><canvas id="proj-chart-spend"></canvas></div>
      </div>
    </div>
  </main>
</div>

var currentView = 'monthly';

function fmtN(n){ return (!n||n===0)?'0':Number(n).toLocaleString(); }
function fmtP(v){ return v==null?'\u2014':v.toFixed(1)+'%'; }
function fmtC(n){ return (n==null||n===0)?'\u2014':'$'+Number(Math.round(n)).toLocaleString(); }
function fmtROAS(n){ return (n==null||n===0)?'\u2014':n.toFixed(2)+'x'; }
function arr(cur,prev){ if(prev==null||prev===0) return ''; if(cur>prev) return '<span class="au">&#9650;</span>'; if(cur<prev) return '<span class="ad">&#9660;</span>'; return ''; }

// Tier coloring: compare a value within its column array
function tier(val, allVals){
  if(val==null) return '';
  var s = allVals.filter(function(x){return x!=null;}).slice().sort(function(a,b){return a-b;});
  if(s.length < 2) return '';
  var span = s[s.length-1] - s[0]; if(span < 0.5) return '';
  var med  = s[Math.floor(s.length/2)];
  if(val >= med + span*0.2) return 'hi';
  if(val <= med - span*0.2) return 'lo';
  return '';
}

// Build tier arrays for a set of rows, per column
function makeTierArrays(rows, segKey){
  return {
    d2r: rows.map(function(r){ return r[segKey].d2r; }),
    r2f: rows.map(function(r){ return r[segKey].r2f; }),
  };
}

function chip(v, cls, tierCls){ return '<span class="chip '+cls+' '+tierCls+'">'+fmtP(v)+'</span>'; }

function switchView(v){
  currentView = v;
  document.getElementById('vt-monthly').classList.toggle('active', v==='monthly');
  document.getElementById('vt-weekly').classList.toggle('active',  v==='weekly');
  render();
}

var currentGeo = DATA.geo_ranks[0];
var projCharts  = {};

function render(){
  buildProjNav();
  renderProjKPIs();
  renderProjTable();
  renderProjCharts();
}

function switchGeo(geo){
  currentGeo = geo;
  render();
}

function buildProjNav(){
  /* sort sidebar by projected full-year funded (desc) */
  var sorted = DATA.geo_ranks.slice().sort(function(a,b){
    var fa = DATA.geo_proj[a].fy_c.funded + DATA.geo_proj[a].fy_e.funded;
    var fb = DATA.geo_proj[b].fy_c.funded + DATA.geo_proj[b].fy_e.funded;
    return fb - fa;
  });
  var html = '';
  sorted.forEach(function(geo, i){
    var rank = i+1;
    var rankCls = rank<=3 ? ' r'+rank : '';
    var activeCls = geo===currentGeo ? ' active' : '';
    var fy = Math.round(DATA.geo_proj[geo].fy_c.funded + DATA.geo_proj[geo].fy_e.funded);
    html += '<div class="proj-nav-item'+activeCls+'" data-geo="'+geo+'">'+
              '<span class="proj-rank'+rankCls+'">'+rank+'</span>'+
              '<span class="proj-nav-name">'+geo+'</span>'+
              '<span class="proj-nav-fy">~'+fy.toLocaleString()+'</span>'+
            '</div>';
  });
  document.getElementById('proj-nav').innerHTML = html;
  document.getElementById('proj-geo-name').textContent = currentGeo;
  document.querySelectorAll('.proj-nav-item[data-geo]').forEach(function(el){
    el.addEventListener('click', function(){ switchGeo(this.dataset.geo); });
  });
}

function renderProjKPIs(){
  var gp  = DATA.geo_proj[currentGeo];
  var ytd = gp.ytd_c.funded + gp.ytd_e.funded;
  var fy  = {funded: gp.fy_c.funded  + gp.fy_e.funded,  spend: gp.fy_c.spend  + gp.fy_e.spend};
  var wma = {funded: gp.wma_c.funded + gp.wma_e.funded, spend: gp.wma_c.spend + gp.wma_e.spend};
  var mar = gp.months.find(function(m){ return m.month==='2026-03'; });
  var marF = mar ? Math.round(mar.tot.funded) : 0;
  var marS = mar ? mar.tot.spend : 0;
  document.getElementById('wma-info').innerHTML =
    'WMA basis: <span>last '+gp.wma_n+' complete weeks</span>';
  document.getElementById('proj-kpi-bar').innerHTML =
    '<div class="kpi k-all"><div class="kpi-lbl">YTD Actual</div>'+
    '<div class="kpi-val">'+Math.round(ytd).toLocaleString()+'</div>'+

      '<td class="f-core">'+fmtN(Math.round(r.tc.funded))+'</td>'+
      '<td>'+fmtC(r.tc.spend)+'</td><td>'+cCPA+'</td>'+
      '<td class="c-sep">'+fmtF(r.ae.funded, r.pe.funded, s)+'</td>'+
      '<td>'+(s!=='complete' ? '<span class="pv">~'+fmtN(Math.round(r.pe.funded))+'</span>' : '\u2014')+'</td>'+
      '<td class="f-exp">'+fmtN(Math.round(r.te.funded))+'</td>'+
      '<td>'+fmtC(r.te.spend)+'</td><td>'+eCPA+'</td>'+
      '<td class="c-sep f-total">'+fmtN(Math.round(r.tot.funded))+'</td>'+
      '<td>'+fmtC(r.tot.spend)+'</td><td>'+tCPA+'</td>'+
      '</tr>';
  });

  /* footer: year/period totals */
  var cF=0,cS=0,eF=0,eS=0,tF=0,tS=0;
  rows.forEach(function(r){
    cF+=r.tc.funded; cS+=r.tc.spend;
    eF+=r.te.funded; eS+=r.te.spend;
    tF+=r.tot.funded; tS+=r.tot.spend;
  });
  h += '</tbody><tfoot><tr>'+
    '<td class="lc">'+(currentView==='monthly'?'Full Year 2026':'All Weeks')+'</td>'+
    '<td></td>'+
    '<td class="c-sep">\u2014</td><td>\u2014</td>'+
    '<td class="f-core"><span class="pv">~'+fmtN(Math.round(cF))+'</span></td>'+
    '<td>'+fmtC(cS)+'</td><td>'+(cF>0?'$'+Math.round(cS/cF).toLocaleString():'\u2014')+'</td>'+
    '<td class="c-sep">\u2014</td><td>\u2014</td>'+
    '<td class="f-exp"><span class="pv">~'+fmtN(Math.round(eF))+'</span></td>'+
    '<td>'+fmtC(eS)+'</td><td>'+(eF>0?'$'+Math.round(eS/eF).toLocaleString():'\u2014')+'</td>'+
    '<td class="c-sep f-total"><span class="pv">~'+fmtN(Math.round(tF))+'</span></td>'+
    '<td>'+fmtC(tS)+'</td><td>'+(tF>0?'$'+Math.round(tS/tF).toLocaleString():'\u2014')+'</td>'+
    '</tr></tfoot></table>';

  document.getElementById('proj-tbl').innerHTML = h;
}

function renderProjCharts(){
  ['funded','spend'].forEach(function(k){
    if(projCharts[k]){ projCharts[k].destroy(); projCharts[k]=null; }
  });
  var CORE_CLR='#3fb950', EXP_CLR='#ffa657';
  var CORE_P='rgba(63,185,80,0.3)', EXP_P='rgba(255,166,87,0.3)';
  var GRID='rgba(48,54,61,0.8)', TICK='#8b949e';

  var months = DATA.geo_proj[currentGeo].months;
  var labels  = months.map(function(m){ return m.label.replace(' 2026',''); });

  function makeChart(id, key, isCur){
    var cA=[],cP=[],eA=[],eP=[];
    months.forEach(function(m){
      var s=m.status;
      cA.push(s==='projected'?0: Math.round(m.ac[key]));
      cP.push(s==='complete' ?0: Math.round(m.pc[key]));
      eA.push(s==='projected'?0: Math.round(m.ae[key]));
      eP.push(s==='complete' ?0: Math.round(m.pe[key]));
    });
    return new Chart(document.getElementById(id).getContext('2d'),{
      type:'bar',
      data:{labels:labels, datasets:[
        {label:'Core Actual',    data:cA, backgroundColor:CORE_CLR, stack:'stack'},
        {label:'Exp Actual',     data:eA, backgroundColor:EXP_CLR,  stack:'stack'},
        {label:'Core Projected', data:cP, backgroundColor:CORE_P,   stack:'stack'},
        {label:'Exp Projected',  data:eP, backgroundColor:EXP_P,    stack:'stack'},
      ]},
      options:{
        responsive:true, maintainAspectRatio:true, aspectRatio:4,
        plugins:{
          legend:{position:'top',labels:{color:TICK,font:{size:11},boxWidth:12,padding:12}},
          tooltip:{
            mode:'index',
            footerColor:'#e6edf3', footerFont:{weight:'bold',size:12}, footerMarginTop:6,
            callbacks:{
              label:function(item){
                var v=item.parsed.y; if(v===0) return null;
                return item.dataset.label+': '+(isCur?'$':'')+Math.round(v).toLocaleString();
              },
              footer:function(items){
                var t=items.reduce(function(s,i){return s+i.parsed.y;},0);
                return 'Total: '+(isCur?'$':'')+Math.round(t).toLocaleString();
              }
            }
          }
        },
        scales:{
          x:{stacked:true, ticks:{color:TICK,font:{size:10}}, grid:{color:GRID}},
          y:{stacked:true, ticks:{color:TICK,font:{size:10},callback:function(v){
            return (isCur?'$':'')+(v>=1000?(v/1000).toFixed(0)+'k':v);
          }}, grid:{color:GRID}}
        }
      }
    });
  }
  projCharts.funded = makeChart('proj-chart-funded','funded',false);
  projCharts.spend  = makeChart('proj-chart-spend', 'spend', true);
}

document.querySelectorAll('.vt-btn[data-view]').forEach(function(b){
  b.addEventListener('click', function(){ switchView(this.dataset.view); });
});
render();

</script>
